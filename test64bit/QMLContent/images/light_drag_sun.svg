  <!-- 光芒底描边（加粗加长，增强可见性） -->
  <g fill="none" stroke="#5A5A5A" stroke-linecap="round" stroke-linejoin="round" opacity="0.98">
    <line x1="48" y1="3" x2="48" y2="17" stroke-width="8.2"/>
    <line x1="48" y1="79" x2="48" y2="93" stroke-width="8.2"/>
    <line x1="3" y1="48" x2="17" y2="48" stroke-width="8.2"/>
