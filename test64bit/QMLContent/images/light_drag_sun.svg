    <line x1="69.8" y1="69.8" x2="79.8" y2="79.8" stroke-width="5"/>
    <line x1="16.2" y1="79.8" x2="26.2" y2="69.8" stroke-width="5"/>
    <line x1="69.8" y1="26.2" x2="79.8" y2="16.2" stroke-width="5"/>
