    <line x1="16.2" y1="16.2" x2="26.2" y2="26.2" stroke-width="8.2"/>
    <line x1="69.8" y1="69.8" x2="79.8" y2="79.8" stroke-width="8.2"/>
    <line x1="16.2" y1="79.8" x2="26.2" y2="69.8" stroke-width="8.2"/>
